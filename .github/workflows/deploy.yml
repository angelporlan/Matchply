name: Deploy to VPS

on:
  workflow_dispatch: # Habilita el botón manual "Run workflow" en la pestaña Actions de GitHub

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            # Ir al directorio del proyecto en el VPS
            cd /app/Matchply
            
            # Traer los últimos cambios de GitHub
            git pull origin main
            
            # Construir primero para evitar apagar la app si falla la build.
            # Si BuildKit tiene snapshots corruptos en el VPS, limpiar caché y reintentar.
            docker compose -f docker-compose.prod.yml build web || {
              docker builder prune -af
              docker compose -f docker-compose.prod.yml build --no-cache web
            }

            # Levantar/recrear los servicios con la imagen ya construida
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
