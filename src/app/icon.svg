<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Rich deep purple background gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E1B4B" />
      <stop offset="100%" stop-color="#120E2B" />
    </linearGradient>
    
    <!-- Shorter left bar gradient -->
    <linearGradient id="left-bar-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8F84F8" />
      <stop offset="100%" stop-color="#6366F1" />
    </linearGradient>
    
    <!-- Taller right bar gradient -->
    <linearGradient id="right-bar-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#B4A9FB" />
      <stop offset="100%" stop-color="#8F84F8" />
    </linearGradient>
  </defs>

  <!-- Rounded base container -->
  <rect width="512" height="512" rx="112" fill="url(#bg-grad)" />

  <!-- Shorter left bar -->
  <rect x="158" y="220" width="80" height="160" rx="24" fill="url(#left-bar-grad)" />

  <!-- Taller right bar -->
  <rect x="274" y="140" width="80" height="240" rx="24" fill="url(#right-bar-grad)" />
</svg>
